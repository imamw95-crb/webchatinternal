<VirtualHost *:80>
    ServerAdmin webmaster@example.com
    DocumentRoot "/www/wwwroot/chat.cloudnod.my.id"
    ServerName 3d71cde2.chat.cloudnod.my.id
    ServerAlias chat.cloudnod.my.id
    #errorDocument 404 /404.html
    IncludeOptional /www/server/panel/vhost/apache/extension/chat.cloudnod.my.id/*.conf
    ErrorLog "/www/wwwlogs/chat.cloudnod.my.id-error_log"
    CustomLog "/www/wwwlogs/chat.cloudnod.my.id-access_log" combined

    #DENY FILES
     <Files ~ (\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)$>
       Order allow,deny
       Deny from all
    </Files>
    
    #PHP
    <FilesMatch \.php$>
            SetHandler "proxy:unix:/tmp/php-cgi-83.sock|fcgi://localhost"
    </FilesMatch>
    
    #PATH
    <Directory "/www/wwwroot/chat.cloudnod.my.id">
        SetOutputFilter DEFLATE
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html index.htm default.php default.html default.htm
    </Directory>
</VirtualHost>
